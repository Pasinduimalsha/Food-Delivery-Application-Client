---
- name: Configure Server and Deploy Application
  hosts: all
  become: yes
  vars:
    app_path: /home/ubuntu/app
    # Variables below are passed from Jenkins via --extra-vars
    # image_name: ""
    # docker_user: ""
    # docker_password: ""

  pre_tasks:
    - name: Wait for system to become reachable
      wait_for_connection:
        timeout: 300

  roles:
    - { role: docker, tags: ["docker"] }
    - { role: app, tags: ["app"] }
