---
- name: Log into Docker Hub
  docker_login:
    username: "{{ docker_user }}"
    password: "{{ docker_password }}"

- name: Pull the specified image for Food Delivery Client
  docker_image:
    name: "{{ image_name }}"
    source: pull

- name: Create the application directory on the server
  file:
    path: "{{ app_path }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Template the docker-compose.yml file to the server
  template:
    src: docker-compose.yml.j2
    dest: "{{ app_path }}/docker-compose.yml"
    owner: ubuntu
    group: ubuntu
    mode: '0644'

- name: Ensure the application service is running with Docker Compose
  community.docker.docker_compose:
    project_src: "{{ app_path }}"
    state: present
    pull: yes
    recreate: always
    project_name: food-delivery-client
    definition:
      version: '3.4'
      services:
        food_delivery_app_client:
          container_name: food-delivery-application-client
          image: "{{ image_name }}"
          environment:
            NODE_ENV: prod
          ports:
            - "3000:80"
          restart: always
          networks:
            - food_delivery_network
      networks:
        food_delivery_network:
          driver: bridge

- name: Clean up old Docker images to save disk space
  docker_prune:
    images: yes
    images_filters:
      dangling: false
